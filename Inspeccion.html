<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="./Oficial_JDL_blanco.png?v=1">
  <link rel="shortcut icon" href="./Oficial_JDL_blanco.png?v=1">
  <link rel="manifest" href="./app.webmanifest">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inspeccion de Habitacion</title>
  <style>
    :root {
      --bg0: #070A12;
      --bg1: #0B1024;
      --card: rgba(255, 255, 255, .06);
      --stroke: rgba(255, 255, 255, .10);
      --text: #EAF0FF;
      --muted: #A9B3D0;

      --accent: #7C3AED;
      --accent2: #22D3EE;
      --ok: #2EE59D;
      --bad: #FF4D6D;
      --na: #FFB020;
      --none: #9AA6C6;

      --shadow: 0 18px 60px rgba(0, 0, 0, .45);
      --r: 18px;
      --r2: 14px;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(124, 58, 237, .22), transparent 55%),
        radial-gradient(900px 600px at 85% 20%, rgba(34, 211, 238, .18), transparent 55%),
        radial-gradient(900px 650px at 30% 85%, rgba(46, 229, 157, .10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height: 100vh;
    }

    .wrap {
      max-width: 1200px;
      margin: 22px auto;
      padding: 0 14px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logoImg {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      object-fit: contain;
      box-shadow: 0 14px 40px rgba(124, 58, 237, .25);
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .10);
      padding: 6px;
    }

    h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: .2px
    }

    .hint {
      color: var(--muted);
      font-size: 12px
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .header {
      padding: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .03));
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 12.5px
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: var(--r2);
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(10, 14, 28, .55);
      color: var(--text);
      outline: none;
      font-size: 14.5px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(34, 211, 238, .45);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, .18);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px
    }

    button {
      border: 1px solid rgba(255, 255, 255, .16);
      background: linear-gradient(180deg, rgba(255, 255, 255, .10), rgba(255, 255, 255, .06));
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-family: "Segoe UI", Tahoma, Verdana, sans-serif;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.25;
      letter-spacing: .2px;
      transition: transform .08s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
      box-shadow: 0 10px 26px rgba(0, 0, 0, .35);
    }

    button:hover {
      background: linear-gradient(180deg, rgba(255, 255, 255, .14), rgba(255, 255, 255, .08));
      border-color: rgba(124, 58, 237, .35);
      box-shadow: 0 14px 34px rgba(0, 0, 0, .45), 0 0 0 4px rgba(124, 58, 237, .15);
    }

    button:active {
      transform: translateY(1px)
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      border: 0;
      background: linear-gradient(135deg, rgba(124, 58, 237, .95), rgba(34, 211, 238, .9));
      color: #07101F;
      box-shadow: 0 16px 38px rgba(34, 211, 238, .25), 0 0 0 1px rgba(255, 255, 255, .08) inset;
    }

    .primary:hover {
      box-shadow: 0 18px 44px rgba(34, 211, 238, .30), 0 0 0 6px rgba(34, 211, 238, .18);
    }

    .submitWrap {
      position: relative
    }

    .btnInner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btnSpinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(7, 16, 31, .22);
      border-top-color: #07101F;
      animation: spin .8s linear infinite;
    }

    .loadingBar {
      margin-top: 10px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .10);
      overflow: hidden;
      opacity: 0;
      transform: scaleY(.85);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }

    .loadingBar.active {
      opacity: 1;
      transform: scaleY(1);
    }

    .loadingBar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(124, 58, 237, .15), rgba(34, 211, 238, .98), rgba(124, 58, 237, .15));
      animation: loadingSlide 1s linear infinite;
    }

    .submitStatus {
      margin-top: 8px;
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .submitStatus.warn {
      color: #FFB020
    }

    .submitStatus.err {
      color: #FF4D6D
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes loadingSlide {
      from {
        transform: translateX(-130%);
      }

      to {
        transform: translateX(320%);
      }
    }

    .toggleFamiliar.on {
      border-color: rgba(255, 176, 32, .65);
      background: linear-gradient(135deg, rgba(255, 176, 32, .92), rgba(255, 214, 102, .92));
      color: #1f1700;
    }

    .btnNA {
      border-color: #FFB020;
      background: #FFB020;
      color: #1a1206;
      text-shadow: none;
    }

    .btnNA:hover {
      border-color: #ffbf4f;
      background: #ffbf4f;
      box-shadow: 0 14px 34px rgba(0, 0, 0, .45), 0 0 0 4px rgba(255, 176, 32, .18);
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .10);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px
    }

    .dot.ok {
      background: var(--ok)
    }

    .dot.bad {
      background: var(--bad)
    }

    .dot.na {
      background: var(--na)
    }

    .dot.none {
      background: var(--none)
    }

    .content {
      padding: 14px
    }

    details {
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: var(--r);
      background: rgba(255, 255, 255, .04);
      overflow: hidden;
      margin-bottom: 12px;
    }

    summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
      background: rgba(255, 255, 255, .04);
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    summary::-webkit-details-marker {
      display: none
    }

    .secLeft {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .secLeft b {
      font-size: 14px
    }

    .secLeft span {
      font-size: 12px;
      color: var(--muted)
    }

    .secRight {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end
    }

    .mini {
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 750;
    }

    .items {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .item {
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(10, 14, 28, .45);
      border-radius: 16px;
      padding: 10px 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: transform .06s ease, border-color .15s ease, background .15s ease;
    }

    .item:hover {
      background: rgba(255, 255, 255, .06)
    }

    .item:active {
      transform: translateY(1px)
    }

    .itemName {
      font-weight: 800;
      font-size: 13.5px;
      line-height: 1.2;
      margin: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 44px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 900;
      border: 1px solid rgba(255, 255, 255, .20);
      background: rgba(255, 255, 255, .10);
      box-shadow: 0 10px 25px rgba(0, 0, 0, .25);
      user-select: none;
      color: #EAF0FF;
      text-shadow: 0 1px 10px rgba(0, 0, 0, .35);
    }

    .s-ok {
      border-color: #2EE59D;
      background: #2EE59D;
      color: #071a13;
      text-shadow: none;
    }

    .s-bad {
      border-color: #FF4D6D;
      background: #FF4D6D;
      color: #1a0b10;
      text-shadow: none;
    }

    .s-na {
      border-color: #FFB020;
      background: #FFB020;
      color: #1a1206;
      text-shadow: none;
    }

    .s-none {
      border-color: #9AA6C6;
      background: #9AA6C6;
      color: #0b1022;
    }

    .checklistCounter {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .10);
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .checklistCounter .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      padding: 0 8px;
      transition: background .2s, color .2s;
    }
    .checklistCounter .num.ok {
      background: rgba(46, 229, 157, .2);
      color: var(--ok);
    }
    .checklistCounter .num.warn {
      background: rgba(255, 176, 32, .2);
      color: var(--na);
    }
    .checklistCounter .num.done {
      background: rgba(46, 229, 157, .25);
      color: var(--ok);
    }
    .item.ok {
      border-color: rgba(46, 229, 157, .28)
    }

    .item.bad {
      border-color: rgba(255, 77, 109, .28)
    }

    .item.na {
      border-color: rgba(255, 176, 32, .28)
    }

    .item.none {
      border-color: rgba(154, 166, 198, .28)
    }

    .footer {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: var(--r);
      background: rgba(255, 255, 255, .04);
    }

    .footerGrid {
      display: grid;
      grid-template-columns: 1.6fr .8fr;
      gap: 12px;
      align-items: end;
    }

    .footer small {
      color: var(--muted)
    }

    .fieldErr {
      border-color: rgba(255, 77, 109, .75) !important;
      box-shadow: 0 0 0 4px rgba(255, 77, 109, .18),
        0 0 0 1px rgba(255, 77, 109, .22) inset !important;
    }

    .shake {
      animation: shake .22s ease;
    }

    @keyframes shake {
      0% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-6px)
      }

      50% {
        transform: translateX(6px)
      }

      75% {
        transform: translateX(-4px)
      }

      100% {
        transform: translateX(0)
      }
    }

    .toasts {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, calc(100vw - 22px));
      display: grid;
      gap: 10px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(12, 16, 34, .62);
      backdrop-filter: blur(16px);
      box-shadow: 0 26px 80px rgba(0, 0, 0, .55);
      transform: translateY(-14px) scale(.98);
      opacity: 0;
      animation: toastIn .26s ease forwards;
    }

    .toast .bar {
      height: 3px;
      background: linear-gradient(90deg, rgba(124, 58, 237, .95), rgba(34, 211, 238, .9), rgba(46, 229, 157, .9));
      opacity: .9;
    }

    .toast.err .bar {
      background: linear-gradient(90deg, rgba(255, 77, 109, .95), rgba(255, 176, 32, .9));
    }

    .toast .inner {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 12px;
    }

    .toast .ico {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, .10);
      border: 1px solid rgba(255, 255, 255, .14);
      box-shadow: 0 12px 25px rgba(0, 0, 0, .30);
      font-size: 18px;
      flex: 0 0 auto;
    }

    .toast .txt b {
      display: block;
      font-size: 13.5px;
      letter-spacing: .1px
    }

    .toast .txt span {
      display: block;
      font-size: 12.8px;
      color: rgba(234, 240, 255, .82);
      line-height: 1.35;
      margin-top: 2px
    }

    .toast .close {
      margin-left: auto;
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .10);
      transition: transform .08s ease, background .15s ease;
      flex: 0 0 auto;
    }

    .toast .close:hover {
      background: rgba(255, 255, 255, .10)
    }

    .toast .close:active {
      transform: translateY(1px)
    }

    @keyframes toastIn {
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr
      }

      .items {
        grid-template-columns: 1fr
      }

      .footerGrid {
        grid-template-columns: 1fr
      }
    }

    @media (max-width: 560px) {
      h1 {
        font-size: 20px
      }

      .hint {
        font-size: 13px
      }

      label {
        font-size: 13.5px
      }

      input,
      select,
      textarea {
        padding: 14px;
        font-size: 16px;
      }

      .toolbar {
        gap: 12px
      }

      button {
        padding: 12px 14px;
        font-size: 14.5px;
        border-radius: 16px;
      }

      .primary {
        font-size: 15px;
      }

      .itemName {
        font-size: 14.5px
      }

      .status {
        min-width: 48px;
        height: 48px;
        font-size: 20px
      }

      .legend {
        font-size: 12.5px
      }

      .footer small {
        font-size: 12.5px
      }
    }
  </style>
</head>

<body>
  <div class="toasts" id="toasts"></div>

  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img class="logoImg" src="Oficial_JDL_blanco.png" alt="Jardines del Lago" />
        <div>
          <h1 id="titleRoom">Inspeccion de Habitacion</h1>
          <div class="hint" id="hintUser">Tip: toca una tarjeta para cambiar . -> OK -> X -> NA</div>
        </div>
      </div>
      <div class="legend">
        <span class="tag"><span class="dot none"></span> Sin seleccionar</span>
        <span class="tag"><span class="dot ok"></span> Cumple</span>
        <span class="tag"><span class="dot bad"></span> No Cumple</span>
        <span class="tag"><span class="dot na"></span> No Aplica</span>
      </div>
    </div>

    <div class="panel">
      <div class="header">
        <div class="grid">
          <div id="boxModulo">
            <label>Modulo</label>
            <input id="moduloTxt" type="text" readonly />
          </div>

          <div id="boxHabitacion">
            <label>Habitacion</label>
            <input id="habitacionTxt" type="text" readonly />
          </div>

          <div>
            <label>Fecha</label>
            <input id="fecha" type="date" />
          </div>

          <div id="boxOcupacion" style="grid-column:1 / -1">
            <div id="ocupacionInfo" style="display:none;padding:8px 12px;border-radius:12px;border:1px solid rgba(34,211,238,.35);background:rgba(34,211,238,.08);font-size:13px;line-height:1.4"></div>
          </div>

          <div>
            <label>Camarera (quien limpia)</label>
            <select id="camarera">
              <option value="">Cargando...</option>
            </select>
          </div>

          <div>
            <label>Tipo de limpieza</label>
            <select id="tipoLimpieza">
              <option value="">Seleccionar...</option>
              <option value="Estadia">Estadia</option>
              <option value="Media Estadia">Media Estadia</option>
              <option value="Limpieza Profunda">Limpieza Profunda</option>
              <option value="Cliente no Quiere Limpieza">Cliente no Quiere Limpieza</option>
              <option value="Salida">Salida</option>
            </select>
          </div>

          <div>
            <label>Inspector (login)</label>
            <input id="inspectorTxt" type="text" readonly />
          </div>
        </div>

        <input type="hidden" id="inpModulo">
        <input type="hidden" id="inpHabitacion">
        <input type="hidden" id="inpUsuario">
        <input type="hidden" id="inpDept">

        <div class="toolbar">
          <div class="btns">
            <button class="primary" id="btnStart">Empezar limpieza</button>
            <button id="btnEnd" disabled>Terminar limpieza</button>
            <button id="btnFamiliar" class="toggleFamiliar" type="button" hidden>Familiar</button>
            <button id="btnAllNA" class="btnNA" type="button" hidden>Poner todos NA</button>
          </div>
        </div>
      </div>

      <div class="content">
        <div class="checklistCounter" id="checklistCounter" style="display:none">
          <span>📋 Progreso:</span>
          <span class="num" id="counterPending">0</span>
          <span>pendientes</span>
          <span style="color:rgba(255,255,255,.15)">·</span>
          <span class="num ok" id="counterDone">0</span>
          <span>completados</span>
        </div>
        <div id="sections"></div>

        <div class="footer">
          <div class="footerGrid">
            <div>
              <label>Observaciones generales</label>
              <textarea id="obsGeneral" rows="4"
                placeholder="Escribi aqui cualquier observacion general (opcional)..."></textarea>
              <small>Observaciones NO son obligatorias.</small>
            </div>
            <div class="submitWrap">
              <button class="primary" id="btnGuardar" style="width:100%;height:48px;" type="button" aria-busy="false">
                <span class="btnInner">
                  <span class="btnLabel">Guardar Inspeccion</span>
                  <span class="btnSpinner" id="btnGuardarSpinner" hidden aria-hidden="true"></span>
                </span>
              </button>
              <div class="loadingBar" id="guardarLoadingBar" aria-hidden="true"></div>
              <div class="submitStatus" id="guardarStatus" aria-live="polite"></div>
              <button id="btnBack" style="width:100%;height:44px;margin-top:10px;">Regresar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    /* =========================
       CONTEXTO DESDE INDEX (m, r, u, d)
    ========================= */
    function getCtx() {
      const qs = new URLSearchParams(window.location.search);
      const modulo = (qs.get("m") || "").trim();
      const habitacion = (qs.get("r") || "").trim();

      let usuario = (qs.get("u") || "").trim();
      let dept = (qs.get("d") || "").trim();

      if (!usuario || !dept) {
        try {
          const sess = JSON.parse(localStorage.getItem("hk_session_v3") || "null");
          if (sess?.name && !usuario) usuario = sess.name;
          if (sess?.dept && !dept) dept = sess.dept;
        } catch { }
      }

      return { modulo, habitacion, usuario, dept };
    }

    const CTX = getCtx();
    const FAMILIAR_ROOMS = new Set(["02", "06"]);
    let useFamiliarArea = false;
    let isSavingInspection = false;

    function setGuardarStatus(message, type = "") {
      const el = $("guardarStatus");
      if (!el) return;
      el.textContent = message || "";
      el.classList.toggle("warn", type === "warn");
      el.classList.toggle("err", type === "err");
    }

    function setGuardarLoading(isLoading, message) {
      const btn = $("btnGuardar");

    // ===== Enviar ISO (UTC) para que backend convierta a Guatemala =====
    function nowLocalMySQL() {

    function gtPartsFromMySQL(mysqlDT) {
      if (!mysqlDT) return null;
      const s = String(mysqlDT).trim();

      // ISO (con o sin Z)
      if (s.includes("T")) {
        const d = new Date(s);
        if (Number.isNaN(d.getTime())) return null;
        const parts = new Intl.DateTimeFormat("es-GT", {
          timeZone: "America/Guatemala",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).formatToParts(d);
        const get = (t) => parts.find(p => p.type === t)?.value;
        return { hour: Number(get("hour")), minute: Number(get("minute")), label: `${get("hour")}:${get("minute")}` };
      }

      // MySQL DATETIME: "YYYY-MM-DD HH:MM:SS"
      const [datePart, timePart] = s.split(" ");
      if (!datePart || !timePart) return null;

      const [Y, M, D] = datePart.split("-").map(Number);
      const [h, m, sec] = timePart.split(":").map(Number);
      // Guatemala = UTC-6 (sin DST)
      const d = new Date(Date.UTC(Y, M - 1, D, h + 6, m, sec || 0));

      const parts = new Intl.DateTimeFormat("es-GT", {
        timeZone: "America/Guatemala",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(d);

      const get = (t) => parts.find(p => p.type === t)?.value;
      return { hour: Number(get("hour")), minute: Number(get("minute")), label: `${get("hour")}:${get("minute")}` };
    }

    function fmtTimeFromMySQL(mysqlDT) {
      const p = gtPartsFromMySQL(mysqlDT);
      return p ? p.label : "-";
    }

    // Monday hour: {hour, minute}
    function toMondayHourObjFromMySQL(mysqlDT) {
      const p = gtPartsFromMySQL(mysqlDT);
      if (!p) return null;
      return { hour: p.hour, minute: p.minute };
    }

    function fmtObsStamp(dtValue) {
      const d = dtValue ? new Date(dtValue) : new Date(nowServerMs());
      if (Number.isNaN(d.getTime())) return "0000-00-00 00:00:00";
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "America/Guatemala",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(d);
      const get = (type) => parts.find(p => p.type === type)?.value || "00";
      return `${get("year")}-${get("month")}-${get("day")} ${get("hour")}:${get("minute")}:${get("second")}`;
    }
    function appendObsLog(prev, action, dtValue, detail) {
      const base = String(prev || "").trim();
      const detailText = String(detail || "").trim();
      const line = `[${fmtObsStamp(dtValue)}] ${action} por ${actorDisplay()}${detailText ? ` - ${detailText}` : ""}`;
      return base ? `${base}\n${line}` : line;
    }
    function toEpochMsFromAnyDate(value) {
      if (!value) return null;
      const s = String(value).trim();
      if (!s) return null;
      if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(s)) {
        const [datePart, timePart] = s.split(" ");
        const [Y, M, D] = datePart.split("-").map(Number);
        const [h, m, sec] = timePart.split(":").map(Number);
        const d = new Date(Date.UTC(Y, M - 1, D, h + 6, m, sec || 0));
        return Number.isNaN(d.getTime()) ? null : d.getTime();
      }
      const d = new Date(s);
      return Number.isNaN(d.getTime()) ? null : d.getTime();
    }

    function restoreSession() {
      try {
        const s = JSON.parse(
          localStorage.getItem(SESSION_KEY_ROOM(HK_ROOM_KEY)) ||
          localStorage.getItem(SESSION_KEY) ||
          "null"
        );
        if (!s) return;

        const sMod = String(s.modulo || "").trim();
        const sHab = normalizeRoom(s.habitacion);
        const cMod = String(CTX.modulo || "").trim();
        const cHab = normalizeRoom(CTX.habitacion);
        const sameRoom =
          (s.roomKey && s.roomKey === HK_ROOM_KEY) ||
          (sMod === cMod && sHab === cHab);

        if (sameRoom) {
          const isTodaySession = String(s.date || "") === todayYMD();

          if (isTodaySession) {
            if (s.date) $("fecha").value = s.date;
            startAtDT = s.startAtDT || null;
            endAtDT = s.endAtDT || null;
            useFamiliarArea = canUseFamiliarArea() && !!s.useFamiliarArea;
            if (s.camareraSel) $("camarera").value = s.camareraSel;
            if (s.tipoSel) $("tipoLimpieza").value = s.tipoSel;
            if (s.obsGeneral) $("obsGeneral").value = s.obsGeneral;
            renderFamiliarUI();
            renderAllNABtn();
          } else {
            // Si la sesion es de otro dia, no arrastrar camarera/horas viejas.
            startAtDT = null;
            endAtDT = null;
            useFamiliarArea = false;
            localStorage.removeItem(SESSION_KEY_ROOM(HK_ROOM_KEY));
            localStorage.removeItem(SESSION_KEY);
          }
        }
      } catch { }
    }

    async function restoreFromDB() {
      try {
        if (!CTX.modulo || !CTX.habitacion) return;
        const r = await fetch(`${API_BASE}/api/rooms?modulo_id=${encodeURIComponent(CTX.modulo)}`, { cache: "no-store" });
        const j = await r.json().catch(() => null);
        if (!r.ok || !j?.ok || !Array.isArray(j.data)) return;

        const target = j.data.find(row => normalizeRoom(row?.etiqueta) === normalizeRoom(CTX.habitacion));
        if (!target) return;

        const estado = String(target.estado || "").trim().toLowerCase();
        currentRoomObservaciones = String(target.observaciones || "");

        // Mostrar ocupacion al camarera (adultos/ninos que dejo recepcion)
        const adultos = Number(target.adultos);
        const ninos = Number(target.ninos);
        const ocupacionEl = document.getElementById("ocupacionInfo");
        if (ocupacionEl) {
          if (adultos > 0 || ninos > 0) {
            const total = adultos + ninos;
            ocupacionEl.innerHTML = `🛏️ Ocupación: ${adultos} Adulto${adultos !== 1 ? 's' : ''}${ninos > 0 ? ` / ${ninos} Niño${ninos !== 1 ? 's' : ''}` : ''} &mdash; <strong>${total} huésped${total !== 1 ? 'es' : ''}</strong>`;
            ocupacionEl.style.display = "block";
          } else {
            ocupacionEl.style.display = "none";
          }
        }

        if (estado === "limpieza" || estado === "inspeccion") {
          if (!startAtDT && target.inicio_limpieza) startAtDT = target.inicio_limpieza;
          if (!endAtDT && target.fin_limpieza) {
            const iniMs = toEpochMsFromAnyDate(target.inicio_limpieza);
            const finMs = toEpochMsFromAnyDate(target.fin_limpieza);
            if (iniMs != null && finMs != null && finMs >= iniMs) {
              endAtDT = target.fin_limpieza;
            }
          }
          if (!$("camarera").value && target.camarera_asignada) {
            const cId = getCamareraIdFromName(target.camarera_asignada);
            if (cId) $("camarera").value = String(cId);
          }
          if (!$("tipoLimpieza").value && target.tipo_limpieza) $("tipoLimpieza").value = target.tipo_limpieza;
        } else {
          // Para un nuevo ciclo (lista/ocupada limpia/etc), iniciar sin bloqueo de horas anteriores.
          startAtDT = null;
          endAtDT = null;
        }

        updateStartEndUI();
        renderAllNABtn();
        saveSession();
      } catch { }
    }

    // ===== Start/End buttons =====
    const btnStart = $("btnStart");
    const btnEnd = $("btnEnd");

    function updateStartEndUI() {
      const started = !!startAtDT;
      const ended = !!endAtDT;

      btnStart.disabled = started;
      btnEnd.disabled = !started || ended;

      btnStart.textContent = started ? `✔ ${fmtTimeFromMySQL(startAtDT)}` : "Empezar limpieza";
      btnEnd.textContent = ended ? `✔ ${fmtTimeFromMySQL(endAtDT)}` : "Terminar limpieza";
    }

    btnStart.addEventListener("click", async () => {
      if (isReadOnlyRole()) {
        toast("Restringido", "Gerencia solo puede visualizar.", false, 3200);
        return;
      }
      const camareraSel = $("camarera").value;
      const tipoSel = $("tipoLimpieza").value;

      if (!camareraSel) {
        toast("Falta Camarera", "Selecciona la camarera (quien limpia).", false, 4200);
        return highlightAndFocus("camarera");
      }
      if (!isCamareraValida(camareraSel)) {
        toast("Camarera invalida", `La camarera "${camareraSel}" no esta en la lista permitida.`, false, 5200);
        return highlightAndFocus("camarera");
      }

      if (!tipoSel) {
        toast("Falta Tipo de Limpieza", "Selecciona el tipo de limpieza antes de iniciar.", false, 4200);
        return highlightAndFocus("tipoLimpieza");
      }

      if (!startAtDT) {
        startAtDT = nowLocalMySQL();
        endAtDT = null;
        updateStartEndUI();
        saveSession();

        try {
          const camareraNombre = $("camarera").selectedOptions?.[0]?.textContent || camareraSel;
          const nextObs = appendObsLog(
            currentRoomObservaciones,
            "INICIO LIMPIEZA",
            startAtDT,
            `Camarera encargada de limpieza: ${camareraNombre}`
          );
          const updated = await updateRoomDB(CTX.modulo, CTX.habitacion, {
            estado: "limpieza",
            inicio_limpieza: startAtDT,
            camarera_asignada: camareraSel,
            tipo_limpieza: tipoSel,
            inspector_asignado: CTX.usuario || null,
            observaciones: nextObs
          });
          currentRoomObservaciones = String(updated?.observaciones ?? nextObs);
          endAtDT = null;
        } catch (e) {
          toast("Error BD", e.message || "No se pudo guardar inicio en MariaDB", false, 5200);
          startAtDT = null;
          updateStartEndUI();
          saveSession();
          return;
        }

        toast("Limpieza iniciada", `Hora inicio: ${fmtTimeFromMySQL(startAtDT)} (BD)`, true, 3200);
        updateStartEndUI();
      }
    });

    btnEnd.addEventListener("click", async () => {
      if (isReadOnlyRole()) {
        toast("Restringido", "Gerencia solo puede visualizar.", false, 3200);
        return;
      }
      if (startAtDT && !endAtDT) {
        endAtDT = nowLocalMySQL();
        updateStartEndUI();
        saveSession();

        try {
          const nextObs = appendObsLog(
            currentRoomObservaciones,
            "FIN LIMPIEZA",
            endAtDT,
            `Camarera encargada de limpieza: ${$("camarera").value || "-"}`
          );
          const updated = await updateRoomDB(CTX.modulo, CTX.habitacion, {
            estado: "inspeccion",
            fin_limpieza: endAtDT,
            camarera_asignada: $("camarera").value || null,
            tipo_limpieza: $("tipoLimpieza").value || null,
            inspector_asignado: CTX.usuario || null,
            observaciones: nextObs
          });
          currentRoomObservaciones = String(updated?.observaciones ?? nextObs);
        } catch (e) {
          toast("Error BD", e.message || "No se pudo guardar fin en MariaDB", false, 5200);
          endAtDT = null;
          updateStartEndUI();
          saveSession();
          return;
        }

        toast("Limpieza terminada", `Hora fin: ${fmtTimeFromMySQL(endAtDT)} (BD)`, true, 3200);
        updateStartEndUI();
      }
    });

    restoreSession();
    updateStartEndUI();

    // ===== Checklist (desde DB) =====
    const state = {};
    const cycle = ["SIN_SELECCION", "CUMPLE", "NO_CUMPLE", "NO_APLICA"];
    const icon = (v) =>
      v === "SIN_SELECCION" ? "." :
        v === "CUMPLE" ? "OK" :
          v === "NO_CUMPLE" ? "X" : "NA";

    function ensure(itemId) {
      if (!state[itemId]) state[itemId] = { estado: "SIN_SELECCION", touched: false };
      return state[itemId];
    }

    function renderChecklistFromDB() {
      const host = $("sections");
      host.innerHTML = "";
      if (!CHECKLIST_ITEMS_DB.length) {
        host.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted)">No hay items de checklist configurados.</div>`;
        return;
      }
      const catIds = Object.keys(CATEGORIAS_MAP);
      catIds.forEach((catId, idx) => {
        const cat = CATEGORIAS_MAP[catId];
        const det = document.createElement("details");
        det.open = (idx === 0);

        const sum = document.createElement("summary");
        const left = document.createElement("div");
        left.className = "secLeft";
        left.innerHTML = `<b>${cat.nombre}</b><span>${cat.nombre}</span>`;
        sum.appendChild(left);

        const itemsWrap = document.createElement("div");
        itemsWrap.className = "items";

        cat.items.forEach(it => {
          const st = ensure(it.id);
          const card = document.createElement("div");
          card.className = "item " + (
            st.estado === "CUMPLE" ? "ok" :
              st.estado === "NO_CUMPLE" ? "bad" :
                st.estado === "NO_APLICA" ? "na" : "none"
          );
          card.dataset.itemId = it.id;

          const name = document.createElement("div");
          name.className = "itemName";
          name.textContent = it.nombre;

          const badge = document.createElement("div");
          badge.className = "status " + (
            st.estado === "CUMPLE" ? "s-ok" :
              st.estado === "NO_CUMPLE" ? "s-bad" :
                st.estado === "NO_APLICA" ? "s-na" : "s-none"
          );
          badge.textContent = icon(st.estado);

          card.addEventListener("click", () => {
            const st2 = ensure(it.id);
            const i = cycle.indexOf(st2.estado);
            st2.estado = cycle[(i + 1) % cycle.length];
            st2.touched = true;
            card.className = "item " + (
              st2.estado === "CUMPLE" ? "ok" :
                st2.estado === "NO_CUMPLE" ? "bad" :
                  st2.estado === "NO_APLICA" ? "na" : "none"
            );
            badge.className = "status " + (
              st2.estado === "CUMPLE" ? "s-ok" :
                st2.estado === "NO_CUMPLE" ? "s-bad" :
                  st2.estado === "NO_APLICA" ? "s-na" : "s-none"
            );
            badge.textContent = icon(st2.estado);
            updateChecklistCounter();
            saveSession();
          });

          card.appendChild(name);
          card.appendChild(badge);
          itemsWrap.appendChild(card);
        });

        det.appendChild(sum);
        det.appendChild(itemsWrap);
        host.appendChild(det);
      });
    }

    function updateChecklistCounter() {
      const el = $("checklistCounter");
      if (!el || !CHECKLIST_ITEMS_DB.length) { if (el) el.style.display = 'none'; return; }
      el.style.display = 'flex';
      let pendientes = 0, completados = 0;
      CHECKLIST_ITEMS_DB.forEach(it => {
        const st = ensure(it.id);
        if (st.estado === 'SIN_SELECCION') pendientes++;
        else completados++;
      });
      const total = CHECKLIST_ITEMS_DB.length;
      const cp = $("counterPending");
      const cd = $("counterDone");
      if (cp) { cp.textContent = pendientes; cp.className = 'num ' + (pendientes === 0 ? 'done' : 'warn'); }
      if (cd) { cd.textContent = completados + '/' + total; cd.className = 'num ' + (pendientes === 0 ? 'done' : 'ok'); }
    }

    function setAllChecklistToNA() {
      CHECKLIST_ITEMS_DB.forEach(it => {
        const st = ensure(it.id);
        st.estado = "NO_APLICA";
        st.touched = true;
      });
      renderChecklistFromDB();
      updateChecklistCounter();
      saveSession();
    }

    function resetAll() {
      Object.keys(state).forEach(k => { state[k].estado = "SIN_SELECCION"; state[k].touched = false; });
      setToday();
      $("camarera").value = "";
      $("tipoLimpieza").value = "";
      $("obsGeneral").value = "";
      startAtDT = null;
      endAtDT = null;
      useFamiliarArea = false;
      currentRoomObservaciones = "";
      localStorage.removeItem(SESSION_KEY_ROOM(HK_ROOM_KEY));
      localStorage.removeItem(SESSION_KEY);
      renderChecklistFromDB();
      clearFieldErrors();
      updateStartEndUI();
      renderFamiliarUI();
      renderAllNABtn();
    }

    function buildAreaLabel(habitacion) {
      const raw = String(habitacion || "").trim();
      if (/^\d+$/.test(raw) && raw.length === 1) return raw.padStart(2, "0");
      return raw;
    }

    function checklistAllSelected() {
      for (const it of CHECKLIST_ITEMS_DB) {
        const st = ensure(it.id);
        if (st.estado === "SIN_SELECCION") return false;
      }
      return true;
    }

    function getCamareraIdFromName(name) {
      if (!name) return null;
      if (/^\d+$/.test(String(name).trim())) return Number(name); // ya es ID
      return CAMARERAS_MAP[normalizeLabel(name)] || null;
    }


    $("camarera").addEventListener("change", saveSession);
    $("tipoLimpieza").addEventListener("change", () => {
      renderAllNABtn();
      saveSession();
    });
    $("fecha").addEventListener("change", saveSession);
    $("obsGeneral").addEventListener("input", () => {
      clearTimeout(window.__obsT);
      window.__obsT = setTimeout(saveSession, 250);
    });
    window.addEventListener("beforeunload", saveSession);
    window.addEventListener("pagehide", saveSession);

    let isSyncingLimpieza = false;
    async function syncLimpiezaMeta() {
      if (isReadOnlyRole()) return;
      if (!startAtDT || endAtDT) return;
      if (isSyncingLimpieza) return;
      const camareraSel = $("camarera").value || null;
      const tipoSel = $("tipoLimpieza").value || null;
      if (!camareraSel && !tipoSel) return;
      isSyncingLimpieza = true;
      try {
        await updateRoomDB(CTX.modulo, CTX.habitacion, {
          estado: "limpieza",
          camarera_asignada: camareraSel,
          tipo_limpieza: tipoSel,
          inspector_asignado: CTX.usuario || null
        });
      } catch { }
      finally { isSyncingLimpieza = false; }
    }

    $("camarera").addEventListener("change", syncLimpiezaMeta);
    $("tipoLimpieza").addEventListener("change", syncLimpiezaMeta);
    $("btnAllNA").addEventListener("click", () => {
      if (isReadOnlyRole()) {
        toast("Restringido", "Gerencia solo puede visualizar.", false, 3200);
        return;
      }
      if (!isTipoClienteNoQuiereLimpieza()) return;
      setAllChecklistToNA();
      toast("Listo", "Todos los checks quedaron en NA.", true, 2600);
    });
    $("btnFamiliar").addEventListener("click", () => {
      if (isReadOnlyRole()) {
        toast("Restringido", "Gerencia solo puede visualizar.", false, 3200);
        return;
      }
      if (!canUseFamiliarArea()) return;
      useFamiliarArea = !useFamiliarArea;
      renderFamiliarUI();
      saveSession();
    });
    window.addEventListener("offline", () => {
      setGuardarStatus("Sin conexion. Espera a recuperar internet antes de enviar.", "err");
      toast("Sin conexion", "No cierres la pantalla; vuelve a intentar cuando regrese la conexion.", false, 6200);
    });
    window.addEventListener("online", () => {
      const pendingSubmit = getPendingInspectionSubmit();
      setGuardarStatus(
        pendingSubmit?.itemId
          ? "Conexion recuperada. Presiona Guardar para liberar la habitacion pendiente."
          : "Conexion recuperada. Ya puedes enviar el checklist.",
        pendingSubmit?.itemId ? "warn" : ""
      );
      toast("Conexion recuperada", pendingSubmit?.itemId ? "Puedes reintentar liberar la habitacion." : "Ya puedes enviar el checklist.", true, 4200);
    });
    // Cargar datos desde DB
    // restoreFromDB() se ejecuta DESPUES de loadCamareras para que las opciones del select existan
    loadCamareras().then(() => {
      reapplyCamareraSel();
      restoreFromDB();
    });
    loadChecklistItems();

    renderFamiliarUI();
    renderAllNABtn();
    $("btnBack").addEventListener("click", () => {
      saveSession();
      window.location.href = "./index.html";
    });

    $("btnGuardar").addEventListener("click", async () => {
      if (isReadOnlyRole()) {
        toast("Restringido", "Gerencia solo puede visualizar.", false, 3200);
        return;
      }
      if (isSavingInspection) {
        toast("En proceso", "Ya se esta enviando el checklist. Espera a que termine.", false, 3200);
        return;
      }
      isSavingInspection = true;
      setGuardarLoading(true, "📤 Guardando checklist...");
      if (isBrowserOffline()) {
        isSavingInspection = false;
        setGuardarLoading(false);
        setGuardarStatus("Sin conexion. Espera a recuperar internet antes de enviar.", "err");
        toast("Sin conexion", "No se enviara el checklist hasta que vuelva la conexion.", false, 5200);
        return;
      }
      clearFieldErrors();

      const modulo = CTX.modulo;
      const habitacion = CTX.habitacion;

      const fecha = $("fecha").value;
      const camareraSel = $("camarera").value;
      const tipoSel = $("tipoLimpieza").value;
      const obsGeneral = $("obsGeneral").value;

      if (!modulo || !habitacion) {
        isSavingInspection = false; setGuardarLoading(false);
        toast("Falta contexto", "No llego Modulo/Habitacion desde index.html.", false, 5200);
        return;
      }
      if (!fecha) { isSavingInspection = false; setGuardarLoading(false); toast("Falta Fecha", "Elige la fecha de la limpieza.", false); return highlightAndFocus("fecha"); }
      if (!camareraSel) { isSavingInspection = false; setGuardarLoading(false); toast("Falta Camarera", "Selecciona la camarera.", false); return highlightAndFocus("camarera"); }
      if (!isCamareraValida(camareraSel)) { isSavingInspection = false; setGuardarLoading(false); toast("Camarera invalida", `"${camareraSel}" no esta permitida.`, false, 5200); return highlightAndFocus("camarera"); }
      if (!tipoSel) { isSavingInspection = false; setGuardarLoading(false); toast("Falta Tipo de Limpieza", "Selecciona Estadia / Media Estadia / etc.", false); return highlightAndFocus("tipoLimpieza"); }
      if (!startAtDT) { isSavingInspection = false; setGuardarLoading(false); toast("Falta iniciar", "Presiona \"Empezar limpieza\" antes de guardar.", false, 4200); return; }
      if (!endAtDT) { isSavingInspection = false; setGuardarLoading(false); toast("Falta terminar", "Presiona \"Terminar limpieza\" antes de guardar.", false, 4200); return; }
      if (!checklistAllSelected()) {
        isSavingInspection = false; setGuardarLoading(false);
        toast("Checklist incompleto", "Hay items en . (sin seleccionar).", false, 4200);
        const first = document.querySelector("details");
        if (first) first.open = true;
        $("sections").scrollIntoView({ behavior: "smooth", block: "start" });
        return;
      }

      const checklistFinishedAtDT = nowLocalMySQL();
      const camareraId = getCamareraIdFromName(camareraSel) || null;

      let tipoLimpiezaId = null;
      try {
        const rTipos = await fetch(`${API_BASE}/api/tipos-limpieza`);
        const jTipos = await rTipos.json();
        if (jTipos?.ok) {
          const found = jTipos.data.find(t => normalizeLabel(t.nombre) === normalizeLabel(tipoSel));
          if (found) tipoLimpiezaId = found.id;
        }
      } catch {}

      const detalles = CHECKLIST_ITEMS_DB.map(it => ({
        item_id: it.id,
        estado: ensure(it.id).estado === "CUMPLE" ? "CUMPLE" :
                ensure(it.id).estado === "NO_CUMPLE" ? "NO_CUMPLE" : "NO_APLICA"
      }));

      const payload = {
        modulo_id: modulo,
        modulo_nombre: CTX_MOD_NAME,
        habitacion_etiqueta: habitacion,
        fecha: fecha,
        camarera_id: camareraId,
        tipo_limpieza_id: tipoLimpiezaId,
        inspector_nombre: CTX.usuario || '',
        inspector_dept: CTX.dept || '',
        inicio_limpieza: startAtDT,
        fin_limpieza: endAtDT,
        hora_checklist: checklistFinishedAtDT,
        observaciones: obsGeneral || null,
        es_decorada: 0,
        es_familiar: useFamiliarArea ? 1 : 0,
        detalles
      };

      setGuardarStatus("📤 Paso 1/2: Guardando checklist...");
      try {
        toast("Guardando", "Guardando checklist en la base de datos...", true, 1800);

        const resp = await fetch(`${API_BASE}/api/inspecciones/guardar`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || !data?.ok) {
          throw new Error(data?.error || "No se pudo guardar la inspeccion");
        }

        toast("Listo OK", `Inspeccion #${data.id} guardada.`, true, 2600);

        // Liberar Habitacion en BD
        setGuardarStatus("✅ Paso 1/2: Checklist guardado. Liberando habitación...");
        try {
          const nextEstado = (String(tipoSel || "").trim().toLowerCase() === "estadia")
            ? "ocupada limpia"
            : "libre";
          await updateRoomDB(CTX.modulo, CTX.habitacion, {
            estado: nextEstado,
            decorada: 0,
            source: "inspeccion"
          });
        } catch (e) {
          setGuardarStatus("Se guardo la inspeccion, pero no se pudo liberar la habitacion.", "err");
          toast("Aviso", "Inspeccion guardada, pero no se pudo liberar la habitacion en BD.", false, 9000);
          console.error("Error liberando en BD:", e);
          return;
        }
        clearPendingInspectionSubmit();

        // indicador local de "limpiada"
        try {
          const k = `${CTX.modulo}::${CTX.habitacion}`;
          const map = JSON.parse(localStorage.getItem("hk_cleaned_rooms_v1") || "{}");
          map[k] = Date.now();
          localStorage.setItem("hk_cleaned_rooms_v1", JSON.stringify(map));
        } catch { }

        localStorage.removeItem(SESSION_KEY);
        resetAll();
        window.location.href = "./index.html?done=1";

      } catch (e) {
        setGuardarStatus("No se pudo guardar la inspeccion. Revisa e intenta de nuevo.", "err");
        toast("Error", String(e), false, 6200);
        console.error(e);
      } finally {
        isSavingInspection = false;
        setGuardarLoading(false);
      }
    });
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(err) {
        console.warn('[SW] No se pudo registrar:', err);
      });
    }
  </script>
</body>

</html>
