<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="./Oficial_JDL_blanco.png?v=1">
  <link rel="shortcut icon" href="./Oficial_JDL_blanco.png?v=1">
  <link rel="manifest" href="./app.webmanifest">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Formulario Decorada</title>
  <style>
    :root{--bg0:#070A12;--bg1:#0B1024;--card:rgba(255,255,255,.06);--stroke:rgba(255,255,255,.10);--text:#EAF0FF;--muted:#A9B3D0;--ok:#2EE59D;--warn:#FFB020;--bad:#FF4D6D;--shadow:0 18px 60px rgba(0,0,0,.45);--r:18px;--r2:14px}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",Tahoma,Verdana,sans-serif;color:var(--text);background:radial-gradient(1200px 700px at 15% 10%,rgba(124,58,237,.22),transparent 55%),radial-gradient(900px 600px at 85% 20%,rgba(34,211,238,.18),transparent 55%),linear-gradient(180deg,var(--bg0),var(--bg1));min-height:100vh}
    .wrap{max-width:900px;margin:24px auto;padding:0 14px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:48px;height:48px;border-radius:12px;object-fit:contain;background:rgba(255,255,255,.06);padding:4px;border:1px solid rgba(255,255,255,.12)}
    h1{font-size:19px;margin:0}
    .hint{font-size:12px;color:var(--muted)}
    .panel{background:var(--card);border:1px solid var(--stroke);border-radius:var(--r);box-shadow:var(--shadow);backdrop-filter:blur(10px);overflow:hidden}
    .content{padding:14px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    label{display:block;margin:0 0 6px;color:var(--muted);font-size:12.5px}
    input,select{width:100%;padding:12px;border-radius:var(--r2);border:1px solid rgba(255,255,255,.10);background:rgba(10,14,28,.55);color:var(--text);outline:none;font-size:14px}
    .boxNote{margin-top:12px;padding:12px;border-radius:14px;border:1px solid rgba(255,176,32,.45);background:rgba(255,176,32,.12);color:#ffe4b5;font-size:13px}
    .btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    button{border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.06));color:var(--text);padding:10px 14px;border-radius:14px;cursor:pointer;font-weight:700;font-size:14px;line-height:1.25;letter-spacing:.2px}
    .primary{border:1px solid rgba(255,176,32,.55);background:linear-gradient(135deg,rgba(255,176,32,.92),rgba(255,214,102,.90));color:#1f1700}
    .loading{text-align:center;padding:40px 14px;color:var(--muted);font-size:14px}
    .toastWrap{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;display:grid;gap:8px;width:min(560px,calc(100vw - 22px))}
    .toast{border-radius:14px;padding:10px 12px;border:1px solid rgba(255,255,255,.12);background:rgba(10,14,28,.92);font-size:13px}
    .toast.ok{border-color:rgba(46,229,157,.45)}
    .toast.err{border-color:rgba(255,77,109,.45)}
    @media(max-width:760px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="toasts" class="toastWrap"></div>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img class="logo" src="./Oficial_JDL_blanco.png" alt="Logo">
        <div>
          <h1>Formulario Decorada</h1>
          <div class="hint">Registra la decoracion. Selecciona el tipo de limpieza.</div>
        </div>
      </div>
    </div>
    <div class="panel" id="mainPanel">
      <div class="loading" id="loadingMsg">Cargando datos...</div>
      <div class="content" id="formContent" style="display:none">
        <div class="grid">
          <div><label>Modulo</label><select id="moduloSel"></select></div>
          <div><label>Habitacion</label><select id="habitacionSel"></select></div>
          <div><label>Encargada</label><select id="encargadaSel"><option value="">Cargando...</option></select></div>
          <div><label>Supervisor</label><input id="supervisorTxt" type="text" /></div>
          <div><label>Fecha</label><input id="fechaTxt" type="date" /></div>
          <div><label>Tipo limpieza</label><select id="tipoLimpiezaSel"><option value="">Cargando...</option></select></div>
        </div>
        <div class="boxNote">Los checks no se muestran: se enviaran todos como <b>No Aplica</b>. La hora se toma al presionar <b>Guardar Decorada</b>.</div>
        <div class="btns">
          <button class="primary" id="btnGuardar" type="button">Guardar Decorada</button>
          <button id="btnBack" type="button">Regresar</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    const APP_BASE = window.location.pathname.replace(/\/[^/]*$/, "/").replace(/\/+$/, "");
    const API_BASE = window.location.origin + APP_BASE;
    let TIME_OFFSET_MS = 0, MODULES = [], ROOMS_BY_MODULE = new Map(), CAMARERAS = [], TIPOS_LIMPIEZA = [];
    const qs = new URLSearchParams(window.location.search);
    const CTX = { moduleId: (qs.get("m") || "").trim(), user: (qs.get("u") || "").trim(), dept: (qs.get("d") || "").trim() };

    function nowServerMs() { return Date.now() + TIME_OFFSET_MS; }
    function toast(msg, ok = true, ms = 3200) {
      const t = document.createElement("div");
      t.className = "toast " + (ok ? "ok" : "err");
      t.textContent = msg;
      $("toasts").appendChild(t);
      setTimeout(() => t.remove(), ms);
    }
    function isReadOnlyRole() {
      const d = (CTX.dept || "").toLowerCase();
      return d.includes("gerencia") || d.includes("reportes");
    }
    const FMT_DEC_DATE = new Intl.DateTimeFormat("en-CA", { timeZone: "America/Guatemala", year: "numeric", month: "2-digit", day: "2-digit" });
    const FMT_DEC_TIME = new Intl.DateTimeFormat("es-GT", { timeZone: "America/Guatemala", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
    function normalizeRoom(v) {
      const s = String(v || "").trim();
      if (/^\d+$/.test(s) && s.length === 1) return s.padStart(2, "0");
      return s;
    }
    function todayYMD() {
      const d = new Date(nowServerMs());
      const p = FMT_DEC_DATE.formatToParts(d);
      const g = t => p.find(x => x.type === t)?.value || "00";
      return g("year") + "-" + g("month") + "-" + g("day");
    }
    function nowGT() {
      const d = new Date(nowServerMs());
      const p = FMT_DEC_TIME.formatToParts(d);
      const g = t => p.find(x => x.type === t)?.value || "00";
      return g("hour") + ":" + g("minute") + ":" + g("second");
    }
    async function syncServerTime() {
      try { const r = await fetch(API_BASE + "/api/time", { cache: "no-store" }); const j = await r.json(); const ms = Number(j?.serverMs); if (Number.isFinite(ms)) TIME_OFFSET_MS = ms - Date.now(); } catch {}
    }
    async function apiGET(path) {
      const r = await fetch(API_BASE + path);
      const j = await r.json();
      if (!r.ok || !j?.ok) throw new Error(j?.error || "GET " + path + " failed");
      return j.data || [];
    }
    async function apiPOST(path, body) {
      const r = await fetch(API_BASE + path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
      const j = await r.json();
      if (!r.ok || !j?.ok) throw new Error(j?.error || "POST " + path + " failed");
      return j;
    }

    function renderModules() {
      const sel = $("moduloSel");
      sel.innerHTML = '<option value="">Seleccionar...</option>';
      MODULES.forEach(m => {
        const o = document.createElement("option");
        o.value = String(m.id);
        o.textContent = String(m.descripcion);
        sel.appendChild(o);
      });
      if (CTX.moduleId && MODULES.some(m => String(m.id) === CTX.moduleId)) sel.value = CTX.moduleId;
      else if (MODULES[0]) sel.value = String(MODULES[0].id);
    }

    function renderCamareras() {
      const sel = $("encargadaSel");
      sel.innerHTML = '<option value="">Seleccionar...</option>';
      CAMARERAS.forEach(c => {
        const o = document.createElement("option");
        o.value = String(c.id);
        o.textContent = c.nombre;
        sel.appendChild(o);
      });
    }

    async function loadRoomsByModule(mod) {
      const m = String(mod || "");
      if (!m) return [];
      if (!ROOMS_BY_MODULE.has(m)) {
        const rows = await apiGET("/api/rooms?modulo_id=" + encodeURIComponent(m));
        ROOMS_BY_MODULE.set(m, Array.isArray(rows) ? rows : []);
      }
      return ROOMS_BY_MODULE.get(m) || [];
    }

    async function loadTiposLimpieza() {
      const data = await apiGET("/api/tipos-limpieza");
      TIPOS_LIMPIEZA = Array.isArray(data) ? data : [];
      const sel = $("tipoLimpiezaSel");
      if (!sel) return;
      sel.innerHTML = '<option value="">Seleccionar...</option>';
      TIPOS_LIMPIEZA.forEach(t => {
        const o = document.createElement("option");
        o.value = t.id;
        o.textContent = t.nombre;
        sel.appendChild(o);
      });
    }

    async function renderRoomsForModule(mod) {
      const sel = $("habitacionSel");
      sel.innerHTML = '<option value="">Seleccionar...</option>';
      const rows = await loadRoomsByModule(mod);
      rows.map(r => normalizeRoom(r?.etiqueta)).filter(Boolean).sort((a, b) => a.localeCompare(b, "es", { numeric: true })).forEach(h => {
        const o = document.createElement("option");
        o.value = h;
        o.textContent = h;
        sel.appendChild(o);
      });
    }

    async function saveDecoradaLocal() {
      const modulo_id = $("moduloSel").value;
      const etiqueta = $("habitacionSel").value;
      const encargada_id = $("encargadaSel").value;
      const supervisor = $("supervisorTxt").value.trim();
      const fecha = $("fechaTxt").value;

      if (!modulo_id) { toast("Selecciona un modulo.", false); return; }
      if (!etiqueta) { toast("Selecciona una habitacion.", false); return; }
      if (!encargada_id) { toast("Selecciona la encargada.", false); return; }
      if (!fecha) { toast("Selecciona la fecha.", false); return; }
      const tipoLimpiezaId = $("tipoLimpiezaSel")?.value;
      if (!tipoLimpiezaId) { toast("Selecciona el tipo de limpieza.", false); return; }
      const tipoNombre = TIPOS_LIMPIEZA.find(t => String(t.id) === String(tipoLimpiezaId))?.nombre || "Salida";

      const encargada = CAMARERAS.find(c => String(c.id) === String(encargada_id));
      const encargadaName = encargada ? encargada.nombre : "";
      const ahoraGT = nowGT();
      const obsLines = [
        "Area: " + etiqueta,
        "Encargada: " + encargadaName,
        "Supervisor: " + (supervisor || "-"),
        "Tipo de limpieza: " + tipoNombre,
        "Fecha: " + fecha,
        "Hora: " + ahoraGT,
        "Checklist: Todos en No Aplica (Decorada)."
      ];
      const observaciones = obsLines.join("\n");

      // Obtener habitacion_id desde la cache
      const rooms = await loadRoomsByModule(modulo_id);
      const room = rooms.find(r => normalizeRoom(r?.etiqueta) === normalizeRoom(etiqueta));
      const habitacion_id = room?.habitacion_id || null;

      // 1. Guardar inspeccion local con es_decorada=1
      const inspeccionData = {
        modulo_id: modulo_id,
        modulo_nombre: MODULES.find(m => String(m.id) === modulo_id)?.descripcion || "",
        habitacion_etiqueta: etiqueta,
        fecha: fecha,
        camarera_id: encargada_id ? Number(encargada_id) : null,
        tipo_limpieza_id: Number(tipoLimpiezaId),
        inspector_nombre: supervisor || CTX.user || "",
        inspector_dept: CTX.dept || "",
        inicio_limpieza: null,
        fin_limpieza: null,
        hora_checklist: new Date(nowServerMs()).toISOString(),
        observaciones: observaciones,
        es_decorada: 1,
        es_familiar: 0
      };

      await apiPOST("/api/inspecciones/guardar", inspeccionData);

      // 2. Marcar habitacion como decorada en estados_habitacion
      if (habitacion_id) {
        await apiPOST("/api/room/update", {
          modulo_id,
          etiqueta,
          patch: { decorada: 1, observaciones: observaciones },
          actor: { name: CTX.user || "", dept: CTX.dept || "" },
          source: "decorada"
        });
      }

      return true;
    }

    $("moduloSel").addEventListener("change", async () => {
      await renderRoomsForModule($("moduloSel").value);
    });
    $("btnBack").addEventListener("click", () => {
      window.location.href = "./index.html";
    });
    $("btnGuardar").addEventListener("click", async () => {
      if (isReadOnlyRole()) {
        toast("Restringido: solo visualizacion.", false);
        return;
      }
      $("btnGuardar").disabled = true;
      try {
        toast("Guardando Decorada...", true, 1500);
        await saveDecoradaLocal();
        toast("Decorada guardada correctamente.", true, 1200);
        setTimeout(() => { window.location.href = "./index.html"; }, 1000);
      } catch (e) {
        toast(String(e?.message || e || "Error al guardar"), false, 5200);
      } finally {
        $("btnGuardar").disabled = false;
      }
    });

    (async function init() {
      await syncServerTime();
      $("fechaTxt").value = todayYMD();
      $("supervisorTxt").value = CTX.user || "";
      try {
        const [mods, camas] = await Promise.all([
          apiGET("/api/modules"),
          apiGET("/api/camareras")
        ]);
        MODULES = Array.isArray(mods) ? mods : [];
        CAMARERAS = Array.isArray(camas) ? camas : [];
        renderModules();
        renderCamareras();
        await loadTiposLimpieza();
        await renderRoomsForModule($("moduloSel").value);
        // Mostrar formulario
        $("loadingMsg").style.display = "none";
        $("formContent").style.display = "block";
      } catch (e) {
        toast("Error cargando datos: " + (e?.message || e), false, 5200);
      }
      if (isReadOnlyRole()) {
        $("moduloSel").disabled = true;
        $("habitacionSel").disabled = true;
        $("encargadaSel").disabled = true;
        $("supervisorTxt").disabled = true;
        $("fechaTxt").disabled = true;
        $("btnGuardar").disabled = true;
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(err) {
        console.warn('[SW] No se pudo registrar:', err);
      });
    }
  </script>
</body>
</html>
